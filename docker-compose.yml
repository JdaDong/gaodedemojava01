# 一键启动：docker compose up -d
# 停止并清理：docker compose down
# 查看日志：  docker compose logs -f
#
# AMAP_KEY 通过 .env 文件或 shell 环境变量注入。
# 本地开发示例：
#   echo "AMAP_KEY=你的Key" > .env && docker compose up -d

services:
  gaode-demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: gaodedemo:latest
    container_name: gaode-demo
    ports:
      - "8080:8080"
    environment:
      # Spring Boot 会自动把 AMAP_KEY 映射到 amap.key（松绑定）
      AMAP_KEY: ${AMAP_KEY:?请先设置 AMAP_KEY 环境变量或在项目根目录创建 .env 文件}
      # 可选：切换 profile / 覆盖其他配置
      # SPRING_PROFILES_ACTIVE: prod
      # AMAP_BASE_URL: https://restapi.amap.com/v3
    restart: unless-stopped
    healthcheck:
      # 命中任一 Spring Boot 提供的接口即可认为健康；这里用 OpenAPI 元数据端点
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v3/api-docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 使用默认 JVM 参数；如需覆盖：
    # environment:
    #   JAVA_OPTS: "-Xms256m -Xmx512m"
